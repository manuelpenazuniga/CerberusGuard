  - id: T205
    epic: E02
    title: "Implement Python adapter for ClawCrate run audit"
    description: |
      ClawCrate emits per-execution audit ndjson under ~/.clawcrate/runs/exec_<id>/
      audit.ndjson. Implement sdk/python/cerberusguard/adapters/clawcrate.py
      that watches that directory for new run dirs (use watchdog or polling)
      and forwards each new audit.ndjson into the collector.
      Map ClawCrate event fields to TrustEvent:
        - layer: "claw_crate"
        - verdict: "ALLOW" if exit_code == 0, "DENY" if blocked
        - payload: include profile, command, fs_decisions, env_scrubbed,
          exit_code, duration_ms
    acceptance_criteria:
      - "`python -m cerberusguard.adapters.clawcrate --help` prints usage"
      - "When `clawcrate run --profile safe -- echo hello` is invoked, a `claw_crate` event appears in the collector"
      - "Watcher detects new runs without restart"
    depends_on: [T105, T203]
    estimate_minutes: 60
    owner_role: backend
    status: pending
    refs:
      - docs/AGENTTRUST_REPO_CLAUDE.md#step-2.3

  - id: T206
    epic: E02
    title: "Implement Python SDK CerberusClient (chat + exec)"
    description: |
      Implement sdk/python/cerberusguard/client.py with:
        class CerberusClient:
            __init__(self, *, agent_id: str, gateway_url: str = "http://localhost:8080/v1")
            chat(self, *, messages, declared_intent=None, declared_paths=None, **kwargs) -> ChatCompletion
            exec(self, command: str, *, profile: str = "safe") -> ExecResult
      `chat` wraps the openai SDK (or httpx if we want to avoid the dep), sets
      `extra_body["_lobstertrap"]` with agent_id, correlation_id (uuid4 per
      session), declared_intent, declared_paths.
      `exec` shells out to `clawcrate run --profile <profile> --
      <command>` with CG_CORRELATION_ID env var set so the ClawCrate adapter
      can preserve correlation.
      Session lifetime: one CerberusClient instance = one correlation_id.
    acceptance_criteria:
      - "`from cerberusguard import CerberusClient` works after `pip install -e ./sdk/python`"
      - "`client.chat(messages=[...])` produces events at LT and PP with the same correlation_id"
      - "`client.exec(\"echo hi\")` produces an event at ClawCrate with the same correlation_id"
    depends_on: [T105, T201, T205]
    estimate_minutes: 75
    owner_role: lead
    status: pending
