  - id: T203
    epic: E02
    title: "Implement cerberus-policy CLI: compile unified YAML"
    description: |
      Implement crates/cerberus-policy/src/main.rs as a clap-based CLI.
      Commands:
        compile <policy.yaml> --out-dir <dir>     # main command
        validate <policy.yaml>                    # syntax + schema check
        list-presets                              # list bundled examples
      The `compile` command:
        1. Parses the unified YAML into a `UnifiedPolicy` struct (serde_yaml)
        2. Calls compile_lobstertrap(), compile_pennyprompt(), compile_clawcrate()
           — each emits a string in the target tool's native config format
        3. Writes outputs to <out-dir>/lobstertrap.yaml,
           <out-dir>/pennyprompt.toml, <out-dir>/clawcrate.yaml
      `UnifiedPolicy` fields: version, policy_name, profile, agent_meta
      (budget caps, session limits), prompt_inspection (block/require_review/
      log_only lists), budget (enforcement, loop_detection), execution
      (default_profile, command_profiles, denied_paths, env_scrub).
      MUST round-trip: parse → struct → serialize → parse identical struct.
    acceptance_criteria:
      - "`cerberus-policy --help` lists all 3 subcommands"
      - "`cerberus-policy compile policy/examples/healthcare-strict.yaml --out-dir /tmp/compiled` exits 0"
