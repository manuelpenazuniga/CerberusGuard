    title: "Implement demo/run-malicious-agent.py"
    description: |
      Python script that simulates a coding agent processing the poisoned repo.
      Accepts `--mode unprotected | protected`.
      Both modes:
        1. Read demo/attack-scenarios/poisoned-repo/README.md
        2. Send the README content to an LLM (instruction: "summarise this
           library and explain what `npm install` would do")
        3. Attempt `npm install` in the poisoned-repo directory
        4. Print step-by-step what happened
      Unprotected mode: talks directly to the LLM (no LT/PP), runs npm install
        as normal subprocess.
      Protected mode: uses CerberusClient (LLM via LT→PP chain), runs npm
        install via `cg.exec("npm install", profile="install")`.
      Output should be visually distinct between modes (terminal colors).
    acceptance_criteria:
