      - docs/AGENTTRUST_PROJECT.md#4.4

  - id: T103
    epic: E01
    title: "Implement cerberus-collector (axum HTTP server, SQLite store)"
    description: |
      Implement the event collector at crates/cerberus-collector/src/main.rs.
      Use axum (0.8) for the HTTP server and rusqlite (0.31+) with JSON1 feature
      for storage (NOT duckdb — see CLAUDE.md §2.8).
      CLI args via clap: --listen (default 0.0.0.0:9090), --db (default
      ./cerberusguard.sqlite).
      Routes:
        GET  /health              -> "ok"
        POST /events              -> ingest TrustEvent JSON, persist
        GET  /events              -> last 100 events DESC, JSON array
        GET  /correlations/:id    -> all events for correlation_id ASC, JSON array
        GET  /metrics             -> JSON: counts by layer, counts by verdict
      Schema: single table `trust_events` with columns matching TrustEvent fields,
      `payload` column as TEXT holding JSON, indexes on correlation_id, agent_id,
      timestamp.
      Use `Arc<Mutex<Connection>>` for shared state. Wrap rusqlite errors in
      anyhow::Error. NEVER unwrap() in handlers — return (StatusCode, String).
      Add `tower-http` permissive CORS layer (needed for dashboard fetch).
    acceptance_criteria:
      - "`cargo build -p cerberus-collector --release` succeeds"
      - "`cargo clippy -p cerberus-collector -- -D warnings` is clean"
      - "`cargo run -p cerberus-collector &` starts; `curl localhost:9090/health` returns \"ok\""
