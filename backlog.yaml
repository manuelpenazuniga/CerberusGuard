      - docs/AGENTTRUST_PROJECT.md#4.2

  - id: T105
    epic: E01
    title: "Implement Python adapter for Lobster Trap audit log"
    description: |
      Create sdk/python/cerberusguard/adapters/lobstertrap.py.
      The adapter tails Lobster Trap's NDJSON audit log, transforms each event
      into the unified TrustEvent JSON shape (see cerberus-types schema), and
      POSTs to the collector.
      Critical invariant: FAIL OPEN. If the collector is unreachable or returns
      an error, log to stderr and continue. Never block on collector errors.
      Use httpx (not requests). Use `from __future__ import annotations`. Type
      hints everywhere. Module-style invocation: `python -m
      cerberusguard.adapters.lobstertrap <log_path> [--collector URL]
      [--no-follow]`.
      Also create the Python package skeleton: `sdk/python/pyproject.toml`
      declaring `cerberusguard` package, dependencies (httpx >= 0.27),
      Python 3.10+. Install with `pip install -e ./sdk/python`.
    acceptance_criteria:
      - "`pip install -e ./sdk/python` succeeds in a fresh venv"
      - "`python -m cerberusguard.adapters.lobstertrap --help` prints usage"
      - "With a sample NDJSON file and collector running, the adapter posts events that appear at `GET /events`"
      - "With the collector stopped, the adapter logs an error and does not crash"
    depends_on: [T103]
    estimate_minutes: 50
    owner_role: backend
    status: pending
    refs:
