  - id: T102
    epic: E01
    title: "Implement cerberus-types crate (TrustEvent schema)"
    description: |
      Implement the unified event schema in crates/cerberus-types/src/lib.rs.
      Required types: `Layer` enum (LobsterTrap, PennyPrompt, ClawCrate),
      `Verdict` enum (Allow, Deny, Log, HumanReview, RateLimit, Quarantine),
      `TrustEvent` struct (timestamp: DateTime<Utc>, agent_id: String,
      request_id: Option<String>, correlation_id: String, layer: Layer,
      verdict: Verdict, action: String, payload: serde_json::Value).
      Serde annotations: Layer uses snake_case, Verdict uses UPPERCASE.
      Include two unit tests: one that asserts serialised JSON shape contains
      `"layer":"lobster_trap"` and `"verdict":"DENY"`, one that round-trips
      a TrustEvent through serde_json.
    acceptance_criteria:
